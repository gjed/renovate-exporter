version: 2

project_name: renovate-exporter

builds:
  - id: renovate-exporter
    main: ./cmd/renovate-exporter/
    binary: renovate-exporter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  # semantic-release owns the changelog; GoReleaser skips it
  skip: true

dockers:
  - id: renovate-exporter-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/gjed/renovate-exporter:{{ .Version }}-amd64"
      - "ghcr.io/gjed/renovate-exporter:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/gjed/renovate-exporter"

  - id: renovate-exporter-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/gjed/renovate-exporter:{{ .Version }}-arm64"
      - "ghcr.io/gjed/renovate-exporter:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/gjed/renovate-exporter"

docker_manifests:
  - name_template: "ghcr.io/gjed/renovate-exporter:{{ .Version }}"
    image_templates:
      - "ghcr.io/gjed/renovate-exporter:{{ .Version }}-amd64"
      - "ghcr.io/gjed/renovate-exporter:{{ .Version }}-arm64"

  - name_template: "ghcr.io/gjed/renovate-exporter:latest"
    image_templates:
      - "ghcr.io/gjed/renovate-exporter:latest-amd64"
      - "ghcr.io/gjed/renovate-exporter:latest-arm64"
