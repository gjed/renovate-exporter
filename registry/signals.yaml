file_format: definition/2
metrics:
  # ── GitHub Pull Request Metrics ────────────────────────────────────────────

  - name: github.pr.count
    instrument: updowncounter
    unit: "{pr}"
    stability: development
    brief: Number of pull requests grouped by state and label.
    note: >
      Use the github.pr.state attribute to distinguish open/merged/closed/draft.
      Use the github.pr.label attribute for label breakdown.

  - name: github.pr.age
    instrument: gauge
    unit: s
    stability: development
    brief: Age of an open pull request in seconds (time since creation).
    note: >
      Recorded as the oldest open PR per repo. The gauge is omitted for repos
      with no open PRs.

  - name: github.pr.close.duration
    instrument: histogram
    unit: s
    stability: development
    brief: Time from PR creation to close (merged or declined) in seconds.
    note: >
      Only recorded for PRs that transitioned to closed/merged since the
      previous collection cycle. Prevents double-counting across cycles.

  - name: github.pr.automerged
    instrument: counter
    unit: "{pr}"
    stability: development
    brief: Total number of pull requests merged via automerge.
    note: >
      A PR is considered automerged if it was merged with no APPROVED review.
      Only counted for PRs merged since the previous collection cycle.

  - name: github.pr.review_status
    instrument: gauge
    unit: "{pr}"
    stability: development
    brief: Number of open pull requests grouped by review status.
    note: >
      Uses the github.pr.review_status attribute to distinguish approved,
      changes_requested, pending, and none states.

  # ── GitHub Issue Metrics ───────────────────────────────────────────────────

  - name: github.issue.count
    instrument: updowncounter
    unit: "{issue}"
    stability: development
    brief: Number of GitHub issues grouped by state and label.
    note: >
      Use the github.issue.state attribute to distinguish open and closed issues.
      Use the github.issue.label attribute for label breakdown.
      Pull requests returned by the GitHub API are excluded.

  - name: github.issue.age
    instrument: gauge
    unit: s
    stability: development
    brief: Age of the oldest open GitHub issue in seconds (time since creation).

  # ── Renovate Dashboard Metrics ─────────────────────────────────────────────

  - name: renovate.dashboard.queue
    instrument: gauge
    unit: "{pr}"
    stability: development
    brief: Number of pull requests in each section of the Renovate dependency dashboard.
    note: >
      The dashboard issue sections (awaiting-schedule, rate-limited, etc.)
      are parsed from the issue body and reported per section.

  - name: renovate.dashboard.parse_error
    instrument: gauge
    unit: "{error}"
    stability: development
    brief: Set to 1 when the Renovate dependency dashboard cannot be parsed, 0 on success.
    note: >
      Emitted per repo. A value of 1 indicates the dashboard issue was found
      but no expected sections (Awaiting Schedule, Rate-Limited, etc.) were
      detected — likely a format change.

  # ── Exporter Self-Metrics ──────────────────────────────────────────────────

  - name: github_exporter.scrape.duration
    instrument: histogram
    unit: s
    stability: development
    brief: Duration of a complete collection cycle in seconds.
    note: Recorded once per collection cycle after all GitHub API calls complete.

  - name: github_exporter.api.errors
    instrument: counter
    unit: "{error}"
    stability: development
    brief: Number of GitHub API errors encountered during collection.

  - name: github_exporter.otlp.errors
    instrument: counter
    unit: "{error}"
    stability: development
    brief: Number of OTLP push failures.
