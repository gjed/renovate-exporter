name: Set up Weaver
description: Downloads and installs the OTel Weaver binary for the current runner OS/arch

inputs:
  weaver-version:
    description: "Weaver release version to install (e.g. '0.23.0')"
    required: true
    # renovate: datasource=github-releases depName=open-telemetry/weaver
    default: "0.23.0"

runs:
  using: composite
  steps:
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  ARCH="x86_64" ;;
          aarch64) ARCH="aarch64" ;;
          arm64)   ARCH="aarch64" ;;
          *)
            echo "Unsupported architecture: $ARCH"
            exit 1
            ;;
        esac
        case "$OS" in
          linux)  TRIPLE="${ARCH}-unknown-linux-gnu" ;;
          darwin) TRIPLE="${ARCH}-apple-darwin" ;;
          *)
            echo "Unsupported OS: $OS"
            exit 1
            ;;
        esac
        echo "triple=$TRIPLE" >> "$GITHUB_OUTPUT"
        echo "os=$OS" >> "$GITHUB_OUTPUT"

    - name: Download Weaver
      shell: bash
      env:
        WEAVER_VERSION: ${{ inputs.weaver-version }}
        TRIPLE: ${{ steps.platform.outputs.triple }}
      run: |
        # As of v0.16.0 the asset filename no longer contains the version number
        # and uses .tar.xz instead of .tar.gz.
        ARCHIVE="weaver-${TRIPLE}.tar.xz"
        URL="https://github.com/open-telemetry/weaver/releases/download/v${WEAVER_VERSION}/${ARCHIVE}"
        echo "Downloading Weaver from: $URL"
        curl -fsSL "$URL" -o /tmp/weaver.tar.xz
        tar -xJf /tmp/weaver.tar.xz -C /tmp
        chmod +x /tmp/weaver
        echo "/tmp" >> "$GITHUB_PATH"

    - name: Verify Weaver installation
      shell: bash
      run: weaver --version
